name: Build & deploy

# Single Docker image for the whole pod — all MCP integrations live in
# the same container under src/integrations/. CI runs tests, builds, pushes
# to GHCR, and bumps the image tag in the infra repo so Flux rolls the pod.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: codeinfinity-pty-ltd/mcp-services

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: uv sync
        run: uv sync --frozen --all-groups

      - name: pytest
        run: uv run pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha,scope=mcp-services
          cache-to: type=gha,mode=max,scope=mcp-services
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:v${{ github.run_number }}-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest

  update-infra:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: CodeInfinity-Pty-Ltd/c8eapps_infrastructure
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Bump image tag
        run: |
          set -euo pipefail
          cd infra
          NEW_TAG="v${{ github.run_number }}-${{ github.sha }}"
          file="infrastructure/mcp-services/app/kustomization.yaml"
          sed -i "s|newTag: .* # {\"\\\$imagepolicy\": \"flux-system:mcp-services:tag\"}|newTag: ${NEW_TAG} # {\"\\\$imagepolicy\": \"flux-system:mcp-services:tag\"}|" "$file"
          git add "$file"

      - name: Commit and push if changed
        run: |
          cd infra
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --cached --quiet || git commit -m "chore(mcp): bump mcp-services to v${{ github.run_number }}"
          git push
